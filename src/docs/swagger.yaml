basePath: /api/v1
definitions:
  handlers.ErrorResponse:
    description: Error response structure
    properties:
      error:
        example: Invalid request
        type: string
    type: object
  handlers.Programme:
    description: Academic programme information
    properties:
      code:
        example: CS101
        type: string
      credits:
        example: 180
        type: integer
      description:
        example: Bachelor's degree in Computer Science
        type: string
      id:
        example: prog_123
        type: string
      name:
        example: Computer Science
        type: string
    type: object
  handlers.ProgrammesResponse:
    description: Response containing list of programmes matching the search criteria
    properties:
      programmes:
        items:
          $ref: '#/definitions/handlers.Programme'
        type: array
    type: object
  handlers.ScheduleEvent:
    description: Schedule event information
    properties:
      courseCode:
        example: MATH101
        type: string
      endTime:
        example: "2024-01-15T10:30:00Z"
        type: string
      id:
        example: evt_123
        type: string
      instructor:
        example: Dr. Smith
        type: string
      location:
        example: Room A101
        type: string
      startTime:
        example: "2024-01-15T09:00:00Z"
        type: string
      title:
        example: Math Lecture
        type: string
    type: object
  handlers.ScheduleEventsResponse:
    description: Response containing list of schedule events parsed from XML
    properties:
      events:
        items:
          $ref: '#/definitions/handlers.ScheduleEvent'
        type: array
    type: object
host: localhost:5055
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: A RESTful Web API for managing Kronox web resources and schedules
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Kronox API
  version: "1.0"
paths:
  /programmes:
    get:
      consumes:
      - application/json
      description: Search for academic programmes across multiple school URLs using
        a search query
      parameters:
      - description: Search query for programmes
        in: query
        name: q
        required: true
        type: string
      - description: School that request pertains to
        example: '"hkr"'
        in: query
        name: school
        required: true
        type: string
      - description: Index of the school URL to use
        example: 0
        in: query
        name: url_index
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of programmes matching search criteria
          schema:
            $ref: '#/definitions/handlers.ProgrammesResponse'
        "400":
          description: Search query required or invalid url_index
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Failed to fetch or parse programmes
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Search for programmes
      tags:
      - programmes
  /schedules:
    get:
      consumes:
      - application/json
      description: Retrieve schedule events for one or more schedule IDs with optional
        language and date filtering
      parameters:
      - description: Comma-separated list of schedule IDs
        example: '"schedule1,schedule2,schedule3"'
        in: query
        name: schedule_ids
        required: true
        type: string
      - description: Start date for filtering events (YYYY-MM-DD format)
        example: '"2024-01-15"'
        format: date
        in: query
        name: start_date
        type: string
      - description: School that request pertains to
        example: '"hkr"'
        in: query
        name: school
        required: true
        type: string
      - description: Index of the school URL to use
        example: 0
        in: query
        name: url_index
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of schedule events
          schema:
            $ref: '#/definitions/handlers.ScheduleEventsResponse'
        "400":
          description: Missing required parameters, invalid date format, or invalid
            url_index
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Failed to fetch or parse schedule data
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Get schedule events
      tags:
      - schedules
swagger: "2.0"
