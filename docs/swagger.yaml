basePath: /api/v1
definitions:
  booking.Availability:
    enum:
    - UNAVAILABLE
    - AVAILABLE
    - BOOKED
    type: string
    x-enum-varnames:
    - Unavailable
    - Available
    - Booked
  booking.AvailabilitySlot:
    properties:
      availability:
        $ref: '#/definitions/booking.Availability'
      location_id:
        type: string
      resource_type:
        type: string
      time_slot_id:
        type: string
    type: object
  booking.Booking:
    properties:
      confirmation_closed:
        type: string
      confirmation_open:
        type: string
      location_id:
        type: string
      resource_id:
        type: string
      show_confirm_button:
        type: boolean
      show_unbook_button:
        type: boolean
      time_slot:
        $ref: '#/definitions/booking.TimeSlot'
    type: object
  booking.BookingRequest:
    properties:
      date:
        type: string
      slot:
        $ref: '#/definitions/booking.AvailabilitySlot'
    type: object
  booking.ConfirmBookingRequest:
    properties:
      resourceId:
        type: string
    type: object
  booking.Resource:
    properties:
      availabilities:
        additionalProperties:
          additionalProperties:
            $ref: '#/definitions/booking.AvailabilitySlot'
          type: object
        type: object
      date:
        type: string
      id:
        type: string
      location_ids:
        items:
          type: string
        type: array
      name:
        type: string
      time_slots:
        items:
          $ref: '#/definitions/booking.TimeSlot'
        type: array
    type: object
  booking.TimeSlot:
    properties:
      from:
        type: string
      id:
        type: integer
      to:
        type: string
    type: object
  handlers.AvailabilityResponse:
    description: Response containing available time slots
    properties:
      availability:
        items:
          $ref: '#/definitions/booking.AvailabilitySlot'
        type: array
    type: object
  handlers.BookingsListResponse:
    description: Response containing list of bookings
    properties:
      bookings:
        items:
          $ref: '#/definitions/booking.Booking'
        type: array
    type: object
  handlers.ConfirmBookingBodyRequest:
    description: Request body for confirming a booking with resource ID
    properties:
      resourceId:
        example: res_123
        type: string
    required:
    - resourceId
    type: object
  handlers.ErrorResponse:
    description: Error response structure
    properties:
      error:
        example: Invalid request
        type: string
    type: object
  handlers.EventsListResponse:
    description: Response containing list of user events
    properties:
      events:
        $ref: '#/definitions/parsers.EventsResponse'
    type: object
  handlers.Programme:
    description: Academic programme information
    properties:
      code:
        example: CS101
        type: string
      credits:
        example: 180
        type: integer
      description:
        example: Bachelor's degree in Computer Science
        type: string
      id:
        example: prog_123
        type: string
      name:
        example: Computer Science
        type: string
    type: object
  handlers.ProgrammesResponse:
    description: Response containing list of programmes matching the search criteria
    properties:
      programmes:
        items:
          $ref: '#/definitions/handlers.Programme'
        type: array
    type: object
  handlers.ResourcesListResponse:
    description: Response containing list of available resources
    properties:
      resources:
        items:
          $ref: '#/definitions/booking.Resource'
        type: array
    type: object
  handlers.ScheduleEvent:
    description: Schedule event information
    properties:
      courseCode:
        example: MATH101
        type: string
      endTime:
        example: "2024-01-15T10:30:00Z"
        type: string
      id:
        example: evt_123
        type: string
      instructor:
        example: Dr. Smith
        type: string
      location:
        example: Room A101
        type: string
      startTime:
        example: "2024-01-15T09:00:00Z"
        type: string
      title:
        example: Math Lecture
        type: string
    type: object
  handlers.ScheduleEventsResponse:
    description: Response containing list of schedule events parsed from XML
    properties:
      events:
        items:
          $ref: '#/definitions/handlers.ScheduleEvent'
        type: array
    type: object
  handlers.SessionValidationResponse:
    description: Session validation response structure
    properties:
      valid:
        example: true
        type: boolean
    type: object
  handlers.SuccessResponse:
    description: Standard success response
    properties:
      message:
        example: Operation completed successfully
        type: string
    type: object
  parsers.EventsResponse:
    properties:
      registered:
        items:
          $ref: '#/definitions/user.AvailableUserEvent'
        type: array
      unregistered:
        items:
          $ref: '#/definitions/user.AvailableUserEvent'
        type: array
      upcoming:
        items:
          $ref: '#/definitions/user.UpcomingUserEvent'
        type: array
    type: object
  user.AvailableUserEvent:
    properties:
      anonymous_code:
        type: string
      event_end:
        type: string
      event_start:
        type: string
      id:
        type: string
      is_registered:
        type: boolean
      last_signup_date:
        type: string
      participator_id:
        type: string
      requires_choosing_location:
        type: boolean
      support_available:
        type: boolean
      support_id:
        type: string
      title:
        type: string
      type:
        type: string
    type: object
  user.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  user.UpcomingUserEvent:
    properties:
      event_end:
        type: string
      event_start:
        type: string
      first_signup_date:
        type: string
      title:
        type: string
      type:
        type: string
    type: object
  user.User:
    properties:
      name:
        type: string
      session_id:
        type: string
      username:
        type: string
    type: object
host: localhost:5055
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: A RESTful Web API for managing Kronox web resources, schedules, events,
    and bookings
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Kronox API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user with username and password across multiple school
        URLs
      parameters:
      - description: Login credentials
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/user.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: User successfully authenticated
          schema:
            $ref: '#/definitions/user.User'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Invalid credentials or login failed
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: User login
      tags:
      - authentication
  /auth/validate:
    get:
      consumes:
      - application/json
      description: Check if a user session is valid across multiple school URLs
      parameters:
      - description: Bearer token (session ID)
        format: Bearer {session_id}
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Session validation result
          schema:
            $ref: '#/definitions/handlers.SessionValidationResponse'
        "400":
          description: Missing session_id in Authorization header
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error during validation
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Validate user session
      tags:
      - authentication
  /bookings/{bookingId}/cancel:
    delete:
      consumes:
      - application/json
      description: Cancel an existing resource booking using booking ID
      parameters:
      - description: Bearer token (session ID)
        format: Bearer {session_id}
        in: header
        name: Authorization
        required: true
        type: string
      - description: Booking ID to cancel
        in: path
        name: bookingId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Booking cancelled successfully
          schema:
            $ref: '#/definitions/handlers.SuccessResponse'
        "400":
          description: bookingId path parameter required
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Session required
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Cancel booking by ID (alternative endpoint)
      tags:
      - bookings
  /bookings/{bookingId}/confirm:
    post:
      consumes:
      - application/json
      description: Confirm an existing resource booking with resource ID provided
        in request body
      parameters:
      - description: Bearer token (session ID)
        format: Bearer {session_id}
        in: header
        name: Authorization
        required: true
        type: string
      - description: Booking ID to confirm
        in: path
        name: bookingId
        required: true
        type: string
      - description: Resource ID for confirmation
        in: body
        name: resource
        required: true
        schema:
          $ref: '#/definitions/handlers.ConfirmBookingBodyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Booking confirmed successfully
          schema:
            $ref: '#/definitions/handlers.SuccessResponse'
        "400":
          description: bookingId path parameter or resourceId in body required
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Session required
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Confirm booking with resource ID in body
      tags:
      - bookings
  /bookings/{bookingId}/confirm/{resourceId}:
    post:
      consumes:
      - application/json
      description: Confirm an existing resource booking using resource ID and booking
        ID from path
      parameters:
      - description: Bearer token (session ID)
        format: Bearer {session_id}
        in: header
        name: Authorization
        required: true
        type: string
      - description: Booking ID to confirm
        in: path
        name: bookingId
        required: true
        type: string
      - description: Resource ID for confirmation
        in: path
        name: resourceId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Booking confirmed successfully
          schema:
            $ref: '#/definitions/handlers.SuccessResponse'
        "400":
          description: bookingId or resourceId path parameter required
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Session required
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Confirm booking by ID (path parameters)
      tags:
      - bookings
  /events:
    get:
      consumes:
      - application/json
      description: Retrieve all events for the authenticated user across multiple
        school URLs
      parameters:
      - description: Bearer token (session ID)
        format: Bearer {session_id}
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of user events
          schema:
            $ref: '#/definitions/handlers.EventsListResponse'
        "401":
          description: Session required
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user events
      tags:
      - events
  /events/{eventId}/register:
    post:
      consumes:
      - application/json
      description: Register the authenticated user for a specific event
      parameters:
      - description: Bearer token (session ID)
        format: Bearer {session_id}
        in: header
        name: Authorization
        required: true
        type: string
      - description: Event ID to register for
        in: path
        name: eventId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successfully registered for event
          schema:
            $ref: '#/definitions/handlers.SuccessResponse'
        "400":
          description: eventId path parameter required
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Session required
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Register for event
      tags:
      - events
  /events/{eventId}/support/{participatorId}/{supportId}:
    delete:
      consumes:
      - application/json
      description: Remove support for a specific participator in an event
      parameters:
      - description: Bearer token (session ID)
        format: Bearer {session_id}
        in: header
        name: Authorization
        required: true
        type: string
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      - description: Participator ID
        in: path
        name: participatorId
        required: true
        type: string
      - description: Support ID to remove
        in: path
        name: supportId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successfully removed event support
          schema:
            $ref: '#/definitions/handlers.SuccessResponse'
        "400":
          description: eventId, participatorId, or supportId path parameter required
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Session required
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Remove event support
      tags:
      - events
  /events/{eventId}/unregister:
    delete:
      consumes:
      - application/json
      description: Unregister the authenticated user from a specific event
      parameters:
      - description: Bearer token (session ID)
        format: Bearer {session_id}
        in: header
        name: Authorization
        required: true
        type: string
      - description: Event ID to unregister from
        in: path
        name: eventId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successfully unregistered from event
          schema:
            $ref: '#/definitions/handlers.SuccessResponse'
        "400":
          description: eventId path parameter required
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Session required
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Unregister from event
      tags:
      - events
  /events/support/{participatorId}/{supportId}:
    post:
      consumes:
      - application/json
      description: Add support for a specific participator in an event
      parameters:
      - description: Bearer token (session ID)
        format: Bearer {session_id}
        in: header
        name: Authorization
        required: true
        type: string
      - description: Participator ID to support
        in: path
        name: participatorId
        required: true
        type: string
      - description: Support ID to add
        in: path
        name: supportId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successfully added event support
          schema:
            $ref: '#/definitions/handlers.SuccessResponse'
        "400":
          description: participatorId or supportId path parameter required
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Session required
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Add event support
      tags:
      - events
  /programmes/search:
    get:
      consumes:
      - application/json
      description: Search for academic programmes across multiple school URLs using
        a search query
      parameters:
      - description: Search query for programmes
        example: '"Computer Science"'
        in: query
        name: q
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of programmes matching the search query
          schema:
            $ref: '#/definitions/handlers.ProgrammesResponse'
        "400":
          description: Search query 'q' required
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Failed to fetch or parse programmes
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Search for programmes
      tags:
      - programmes
  /resources:
    get:
      consumes:
      - application/json
      description: Retrieve all available resources for booking across multiple school
        URLs
      parameters:
      - description: Bearer token (session ID)
        format: Bearer {session_id}
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of available resources
          schema:
            $ref: '#/definitions/handlers.ResourcesListResponse'
        "401":
          description: Session required
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get all resources
      tags:
      - resources
  /resources/{resourceId}/availability:
    get:
      consumes:
      - application/json
      description: Get available time slots for a specific resource on a given date
        using path parameter
      parameters:
      - description: Bearer token (session ID)
        format: Bearer {session_id}
        in: header
        name: Authorization
        required: true
        type: string
      - description: Resource ID to check availability for
        in: path
        name: resourceId
        required: true
        type: string
      - description: Date in YYYY-MM-DD format
        format: date
        in: query
        name: date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Available time slots for the resource
          schema:
            $ref: '#/definitions/handlers.AvailabilityResponse'
        "400":
          description: resourceId and date are required
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Session required
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get available resources (alternative endpoint)
      tags:
      - resources
  /resources/{resourceId}/book:
    post:
      consumes:
      - application/json
      description: Create a new booking for a specific resource and time slot
      parameters:
      - description: Bearer token (session ID)
        format: Bearer {session_id}
        in: header
        name: Authorization
        required: true
        type: string
      - description: Resource ID to book
        in: path
        name: resourceId
        required: true
        type: string
      - description: Booking details
        in: body
        name: booking
        required: true
        schema:
          $ref: '#/definitions/booking.BookingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Booking successful
          schema:
            $ref: '#/definitions/handlers.SuccessResponse'
        "400":
          description: Invalid request data
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Session required
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Book a resource
      tags:
      - bookings
  /resources/{resourceId}/bookings:
    get:
      consumes:
      - application/json
      description: Retrieve all active bookings for a specific resource
      parameters:
      - description: Bearer token (session ID)
        format: Bearer {session_id}
        in: header
        name: Authorization
        required: true
        type: string
      - description: Resource ID to get bookings for
        in: path
        name: resourceId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of active bookings for the resource
          schema:
            $ref: '#/definitions/handlers.BookingsListResponse'
        "400":
          description: resourceId path parameter required
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Session required
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get active bookings for resource
      tags:
      - bookings
  /resources/availability:
    get:
      consumes:
      - application/json
      description: Get available time slots for a specific resource on a given date
      parameters:
      - description: Bearer token (session ID)
        format: Bearer {session_id}
        in: header
        name: Authorization
        required: true
        type: string
      - description: Resource ID to check availability for
        in: query
        name: resource_id
        required: true
        type: string
      - description: Date in YYYY-MM-DD format
        format: date
        in: query
        name: date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Available time slots for the resource
          schema:
            $ref: '#/definitions/handlers.AvailabilityResponse'
        "400":
          description: resource_id and date are required
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Session required
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get resource availability
      tags:
      - resources
  /resources/bookings:
    get:
      consumes:
      - application/json
      description: Retrieve all bookings made by the authenticated user
      parameters:
      - description: Bearer token (session ID)
        format: Bearer {session_id}
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of user bookings
          schema:
            $ref: '#/definitions/handlers.BookingsListResponse'
        "401":
          description: Session required
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user bookings
      tags:
      - bookings
  /resources/bookings/{bookingId}:
    delete:
      consumes:
      - application/json
      description: Cancel an existing resource booking
      parameters:
      - description: Bearer token (session ID)
        format: Bearer {session_id}
        in: header
        name: Authorization
        required: true
        type: string
      - description: Booking ID to cancel
        in: path
        name: bookingId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Booking cancelled successfully
          schema:
            $ref: '#/definitions/handlers.SuccessResponse'
        "400":
          description: bookingId is required
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Session required
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Cancel a booking
      tags:
      - bookings
  /resources/bookings/{bookingId}/confirm:
    post:
      consumes:
      - application/json
      description: Confirm an existing resource booking with resource ID in request
        body
      parameters:
      - description: Bearer token (session ID)
        format: Bearer {session_id}
        in: header
        name: Authorization
        required: true
        type: string
      - description: Booking ID to confirm
        in: path
        name: bookingId
        required: true
        type: string
      - description: Confirmation details
        in: body
        name: confirmation
        required: true
        schema:
          $ref: '#/definitions/booking.ConfirmBookingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Booking confirmed successfully
          schema:
            $ref: '#/definitions/handlers.SuccessResponse'
        "400":
          description: Invalid request data
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Session required
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Confirm a booking
      tags:
      - bookings
  /schedules:
    get:
      consumes:
      - application/json
      description: Retrieve schedule events for one or more schedule IDs with optional
        language and date filtering
      parameters:
      - description: Comma-separated list of schedule IDs
        example: '"schedule1,schedule2,schedule3"'
        in: query
        name: schedule_ids
        required: true
        type: string
      - description: Language preference for the schedule
        example: '"en"'
        in: query
        name: language
        type: string
      - description: Start date for filtering events (YYYY-MM-DD format)
        example: '"2024-01-15"'
        format: date
        in: query
        name: start_date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of schedule events
          schema:
            $ref: '#/definitions/handlers.ScheduleEventsResponse'
        "400":
          description: Missing required parameters or invalid date format
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Failed to fetch or parse schedule data
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
